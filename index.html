// ── Yahoo Finance API ──
var PROXY_URLS = [
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url='
];
var currentProxy = 0;

function fetchPrices(){
  state.status = 'loading';
  render();
  var tickers = HOLDINGS.map(function(h){return h.t}).join(',');
  var yahooUrl = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + encodeURIComponent(tickers) + '&fields=regularMarketPrice,regularMarketChangePercent,regularMarketChange';
  var proxyUrl = PROXY_URLS[currentProxy] + encodeURIComponent(yahooUrl);

  fetch(proxyUrl)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(data){
      if(!data || !data.quoteResponse || !data.quoteResponse.result) throw new Error('Bad response');
      var results = data.quoteResponse.result;
      for(var i=0;i<results.length;i++){
        var q = results[i];
        var sym = q.symbol;
        for(var j=0;j<HOLDINGS.length;j++){
          if(HOLDINGS[j].t === sym){
            HOLDINGS[j].pr = q.regularMarketPrice || HOLDINGS[j].pr;
            HOLDINGS[j].dc = q.regularMarketChangePercent || 0;
            HOLDINGS[j].prevClose = q.regularMarketPreviousClose || HOLDINGS[j].pr;
            // Recalculate upside based on live price
            HOLDINGS[j].liveUp = ((HOLDINGS[j].fv / HOLDINGS[j].pr) - 1) * 100;
            break;
          }
        }
      }
      state.status = 'ok';
      state.lastUpdate = new Date();
      render();
    })
    .catch(function(err){
      console.warn('Proxy '+currentProxy+' failed:', err.message);
      // Try next proxy
      if(currentProxy < PROXY_URLS.length - 1){
        currentProxy++;
        fetchPrices();
      } else {
        currentProxy = 0;
        state.status = 'error';
        state.lastUpdate = state.lastUpdate || new Date();
        render();
      }
    });
}

      o+='<div style="margin-bottom:5px"><div class="fx jb" style="margin-bottom:2px"><span style="font-size:10px;color:#9ca3af">'+s.nm+'</span><span class="mono" style="font-size:10px;color:'+c+'">'+s.avg+'</span></div><div class="barT"><div class="barF" style="width:'+s.avg+'%;background:'+c+'"></div></div></div>';
    });
    o+='</div></div>';
  }

  // ── FOOTER ──
  o += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid #1f2937" class="fx jb">';
  o += '<span style="font-size:9px;color:#4b5563">MARANGO EQUITY FUND, FI - ES0166932006 - Quality x Regime - Bloque 1 V4 + Bloque 5 V5</span>';
  o += '<span class="mono" style="font-size:9px;color:#4b5563">'+new Date().toLocaleString('es-ES')+'</span>';
  o += '</div>';

  document.getElementById('app').innerHTML = o;
}

// ── Global handlers ──
window.switchTab = function(t){state.tab=t;render()};
window.selectStock = function(t){state.sel=t;render()};
window.setFilter = function(s){state.fSec=s;render()};

// Initial render
render();
</script>
